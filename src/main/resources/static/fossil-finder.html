<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fossil Finder - Browse Sites</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:wght@400;600;700&family=Unbounded:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/search.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-left">
          <h1>Fossil Finder</h1>
          <div class="territory-display">
            <span class="territory-code" id="territoryCode">--</span>
            <span id="territoryName">Loading...</span>
          </div>
        </div>
        <a href="index.html" class="back-button">← All Territories</a>
      </header>

      <div class="search-panel">
        <div class="filter-grid">
          <div class="filter-group">
            <label for="location">Location / County</label>
            <select id="location">
              <option value="">All Locations</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="age">Geological Age</label>
            <select id="age">
              <option value="">All Ages</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="formation">Formation</label>
            <select id="formation">
              <option value="">All Formations</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="fossil">Fossil Type</label>
            <input
              type="text"
              id="fossil"
              placeholder="e.g., trilobites, brachiopods"
            />
          </div>
        </div>
        <div class="search-actions">
          <button class="btn-secondary" onclick="clearFilters()">
            Clear Filters
          </button>
          <button class="btn-primary" onclick="searchFossils()">
            Search Sites
          </button>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat">
          <span>Showing</span>
          <span class="stat-number" id="resultCount">0</span>
          <span>sites</span>
        </div>
        <div class="stat">
          Total in Territory: <span class="stat-number" id="totalCount">0</span>
        </div>
      </div>

      <!-- Weather Widget -->
      <div
        id="weatherWidget"
        style="
          display: none;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          padding: 20px;
          border-radius: 12px;
          margin-bottom: 20px;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        "
      >
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <div>
            <h3
              style="margin: 0 0 10px 0; font-size: 1.2rem"
              id="weatherLocation"
            >
              Loading...
            </h3>
            <div style="display: flex; align-items: center; gap: 15px">
              <div style="font-size: 3rem; font-weight: bold" id="weatherTemp">
                --°
              </div>
              <div>
                <div
                  style="font-size: 1.1rem; text-transform: capitalize"
                  id="weatherDesc"
                >
                  --
                </div>
                <div style="opacity: 0.9; font-size: 0.9rem">
                  Feels like <span id="weatherFeels">--</span>°F
                </div>
              </div>
            </div>
          </div>
          <div style="text-align: right">
            <img
              id="weatherIcon"
              src=""
              alt="Weather"
              style="
                width: 80px;
                height: 80px;
                filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
              "
            />
            <div
              style="
                display: flex;
                gap: 20px;
                margin-top: 10px;
                font-size: 0.9rem;
                justify-content: flex-end;
              "
            >
              <div style="display: flex; align-items: center; gap: 5px">
                <img
                  src="https://openweathermap.org/img/wn/50d@2x.png"
                  style="
                    width: 20px;
                    height: 20px;
                    filter: brightness(0) invert(1);
                  "
                  alt="humidity"
                />
                <span id="weatherHumidity">--</span>%
              </div>
              <div style="display: flex; align-items: center; gap: 5px">
                <span style="font-size: 1.2rem">💨</span>
                <span id="weatherWind">--</span> mph
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="results" class="results-grid"></div>
    </div>

    <script>
      let fossilData = [];
      let currentTerritory = "";
      let currentTerritoryName = "";

      const territoryNames = {
        AB: "Alberta",
        BC: "British Columbia",
        MB: "Manitoba",
        NB: "New Brunswick",
        NL: "Newfoundland and Labrador",
        NS: "Nova Scotia",
        NT: "Northwest Territories",
        NU: "Nunavut",
        ON: "Ontario",
        PE: "Prince Edward Island",
        QC: "Quebec",
        SK: "Saskatchewan",
        YT: "Yukon",
        AL: "Alabama",
        AK: "Alaska",
        AZ: "Arizona",
        AR: "Arkansas",
        CA: "California",
        CO: "Colorado",
        CT: "Connecticut",
        DC: "District of Columbia",
        DE: "Delaware",
        FL: "Florida",
        GA: "Georgia",
        HI: "Hawaii",
        ID: "Idaho",
        IL: "Illinois",
        IN: "Indiana",
        IA: "Iowa",
        KS: "Kansas",
        KY: "Kentucky",
        LA: "Louisiana",
        ME: "Maine",
        MD: "Maryland",
        MA: "Massachusetts",
        MI: "Michigan",
        MN: "Minnesota",
        MS: "Mississippi",
        MO: "Missouri",
        MT: "Montana",
        NE: "Nebraska",
        NV: "Nevada",
        NH: "New Hampshire",
        NJ: "New Jersey",
        NM: "New Mexico",
        NY: "New York",
        NC: "North Carolina",
        ND: "North Dakota",
        OH: "Ohio",
        OK: "Oklahoma",
        OR: "Oregon",
        PA: "Pennsylvania",
        RI: "Rhode Island",
        SC: "South Carolina",
        SD: "South Dakota",
        TN: "Tennessee",
        TX: "Texas",
        UT: "Utah",
        VT: "Vermont",
        VA: "Virginia",
        WA: "Washington",
        WV: "West Virginia",
        WI: "Wisconsin",
        WY: "Wyoming",
        BA: "Bahamas",
      };

      function getTerritoryFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get("territory") || "OH";
      }

      async function loadData() {
        currentTerritory = getTerritoryFromURL().toUpperCase();
        currentTerritoryName =
          territoryNames[currentTerritory] || currentTerritory;

        document.getElementById("territoryCode").textContent = currentTerritory;
        document.getElementById("territoryName").textContent =
          currentTerritoryName;
        document.title = `Fossil Finder - ${currentTerritoryName}`;

        try {
          const response = await fetch(`/api/territory/${currentTerritory}`);

          if (!response.ok) {
            throw new Error("Territory data not found");
          }

          fossilData = await response.json();
          populateFilters();
          displayResults(fossilData);
          document.getElementById("totalCount").textContent = fossilData.length;

          // Load weather for the territory on initial load
          loadTerritoryWeather();
        } catch (error) {
          console.error("Error loading data:", error);
          document.getElementById("results").innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">⚠️</div>
            <p>No fossil data available for ${currentTerritoryName}.</p>
            <p style="margin-top: 1rem;">
              <a href="index.html" class="back-button">← Return to Territory Selection</a>
            </p>
          </div>
        `;
        }
      }

      function populateFilters() {
        // Populate Age dropdown
        const ages = [
          ...new Set(
            fossilData.map((item) => item.age || item.Age).filter((age) => age),
          ),
        ].sort();
        const ageSelect = document.getElementById("age");
        ages.forEach((age) => {
          const option = document.createElement("option");
          option.value = age;
          option.textContent = age;
          ageSelect.appendChild(option);
        });

        // Populate Formation dropdown
        const formations = [
          ...new Set(
            fossilData
              .map((item) => item.formation || item.Formation)
              .filter((f) => f),
          ),
        ].sort();
        const formationSelect = document.getElementById("formation");
        formations.forEach((formation) => {
          const option = document.createElement("option");
          option.value = formation;
          option.textContent = formation;
          formationSelect.appendChild(option);
        });

        // Populate Location/County dropdown
        const locations = [
          ...new Set(
            fossilData
              .map((item) => {
                const location = item.location || item.Location || "";
                const county = item.county || item.County || "";
                // Combine location and county for better filtering
                if (location && county && county !== "-") {
                  return `${location}, ${county}`;
                } else if (location) {
                  return location;
                } else if (county && county !== "-") {
                  return county;
                }
                return null;
              })
              .filter((loc) => loc),
          ),
        ].sort();

        const locationSelect = document.getElementById("location");
        locations.forEach((location) => {
          const option = document.createElement("option");
          option.value = location;
          option.textContent = location;
          locationSelect.appendChild(option);
        });
      }

      function searchFossils() {
        const locationFilter = document.getElementById("location").value;
        const ageFilter = document.getElementById("age").value;
        const formationFilter = document.getElementById("formation").value;
        const fossilFilter = document
          .getElementById("fossil")
          .value.toLowerCase();

        // Update weather based on location filter
        if (locationFilter) {
          loadWeather(locationFilter);
        } else {
          loadTerritoryWeather();
        }

        const filtered = fossilData.filter((item) => {
          const location = item.location || item.Location || "";
          const county = item.county || item.County || "";
          const age = item.age || item.Age || "";
          const formation = item.formation || item.Formation || "";
          const fossils = item.fossils || item.Fossils || "";
          const comments = item.comments || item.Comments || "";

          const matchLocation =
            !locationFilter ||
            `${location}, ${county}` === locationFilter ||
            location === locationFilter ||
            county === locationFilter;

          const matchAge = !ageFilter || age === ageFilter;
          const matchFormation =
            !formationFilter || formation === formationFilter;
          const matchFossil =
            !fossilFilter ||
            fossils.toLowerCase().includes(fossilFilter) ||
            comments.toLowerCase().includes(fossilFilter);

          return matchLocation && matchAge && matchFormation && matchFossil;
        });

        displayResults(filtered);
      }

      function clearFilters() {
        document.getElementById("location").value = "";
        document.getElementById("age").value = "";
        document.getElementById("formation").value = "";
        document.getElementById("fossil").value = "";
        loadTerritoryWeather();
        displayResults(fossilData);
      }

      async function loadTerritoryWeather() {
        try {
          // Load weather for the territory/state center
          const state = currentTerritoryName;

          document.getElementById("weatherWidget").style.display = "block";
          document.getElementById("weatherLocation").textContent =
            `Weather in ${state}`;
          document.getElementById("weatherTemp").textContent = "...";

          const response = await fetch(
            `/api/weather?county=&state=${encodeURIComponent(currentTerritory)}`,
          );

          if (!response.ok) {
            throw new Error("Weather data not available");
          }

          const weather = await response.json();
          displayWeather(weather);
        } catch (error) {
          console.error("Error loading weather:", error);
          document.getElementById("weatherWidget").style.display = "none";
        }
      }

      async function loadWeather(locationString) {
        try {
          let county = locationString;
          let state = currentTerritory;

          county = county.split(",")[0].trim();

          document.getElementById("weatherWidget").style.display = "block";
          document.getElementById("weatherLocation").textContent =
            `Weather for ${locationString}`;
          document.getElementById("weatherTemp").textContent = "...";

          const response = await fetch(
            `/api/weather?county=${encodeURIComponent(county)}&state=${encodeURIComponent(state)}`,
          );

          if (!response.ok) {
            throw new Error("Weather data not available");
          }

          const weather = await response.json();
          displayWeather(weather);
        } catch (error) {
          console.error("Error loading weather:", error);
          document.getElementById("weatherWidget").style.display = "none";
        }
      }

      function displayWeather(weather) {
        document.getElementById("weatherLocation").textContent =
          `Current Weather in ${weather.location}`;
        document.getElementById("weatherTemp").textContent =
          Math.round(weather.temperature) + "°";
        document.getElementById("weatherFeels").textContent = Math.round(
          weather.feelsLike,
        );
        document.getElementById("weatherDesc").textContent =
          weather.description;
        document.getElementById("weatherHumidity").textContent =
          weather.humidity;
        document.getElementById("weatherWind").textContent = Math.round(
          weather.windSpeed,
        );

        document.getElementById("weatherIcon").src =
          `https://openweathermap.org/img/wn/${weather.icon}@2x.png`;

        document.getElementById("weatherWidget").style.display = "block";
      }

      function getAgeBadgeClass(age) {
        if (!age) return "";

        // Normalize age string: remove modifiers, punctuation, brackets
        const normalized = age
          .toLowerCase()
          .replace(/\[?\?\]?/g, "") // Remove [?] and ?
          .replace(/\s+(upper|lower|middle|and)/g, "") // Remove position modifiers
          .replace(/\s+\(.*?\)/g, "") // Remove parenthetical notes like (Uintan)
          .split(/[-,|]/)[0] // Take first part before hyphen/comma/pipe
          .trim();

        // Map to standard geological periods
        const periodMap = {
          cambrian: "cambrian",
          ordovician: "ordovician",
          silurian: "silurian",
          devonian: "devonian",
          mississippian: "mississippian",
          pennsylvanian: "pennsylvanian",
          carboniferous: "carboniferous",
          permian: "permian",
          triassic: "triassic",
          jurassic: "jurassic",
          cretaceous: "cretaceous",
          paleocene: "paleocene",
          eocene: "eocene",
          oligocene: "oligocene",
          miocene: "miocene",
          pliocene: "pliocene",
          pleistocene: "pleistocene",
          holocene: "holocene",
          tertiary: "tertiary",
          quaternary: "quaternary",
          paleozoic: "paleozoic",
          mesozoic: "mesozoic",
          cenozoic: "cenozoic",
          precambrian: "precambrian",
          proterozoic: "proterozoic",
          neoproterozoic: "neoproterozoic",
          ediacaran: "ediacaran",
          recent: "recent",
          pleist: "pleistocene", // Handle typo
        };

        return `age-${periodMap[normalized] || "unknown"}`;
      }

      function displayResults(results) {
        const resultsContainer = document.getElementById("results");
        document.getElementById("resultCount").textContent = results.length;

        if (results.length === 0) {
          resultsContainer.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">🔍</div>
            <p>No fossil sites found matching your criteria.<br>Try adjusting your filters.</p>
          </div>
        `;
          return;
        }

        resultsContainer.innerHTML = results
          .map((item) => {
            const location =
              item.location || item.Location || "Unknown Location";
            const county = item.county || item.County || "";
            const age = item.age || item.Age || "";
            const formation = item.formation || item.Formation || "";
            const directions =
              item.directions || item["Directions/Notes"] || "";
            const fossils = item.fossils || item.Fossils || "";

            return `
          <div class="fossil-card">
            <div class="card-header">
              <div class="location-name">${location}</div>
              ${county && county !== "-" ? `<span class="county-badge">${county} County</span>` : ""}
            </div>
            <div class="card-body">
              ${
                age
                  ? `
                <div class="info-row">
                  <span class="info-label">Age:</span>
                  <span class="info-value">
                    <span class="age-badge ${getAgeBadgeClass(age)}">${age}</span>
                  </span>
                </div>
              `
                  : ""
              }
              ${
                formation
                  ? `
                <div class="info-row">
                  <span class="info-label">Formation:</span>
                  <span class="info-value">${formation}</span>
                </div>
              `
                  : ""
              }
              ${
                directions
                  ? `
                <div class="info-row">
                  <span class="info-label">Location:</span>
                  <span class="info-value">${directions}</span>
                </div>
              `
                  : ""
              }
              ${
                fossils
                  ? `
                <div class="fossil-list">
                  <strong>Fossils Found:</strong> ${fossils}
                </div>
              `
                  : ""
              }
            </div>
          </div>
        `;
          })
          .join("");
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("fossil").addEventListener("keypress", (e) => {
          if (e.key === "Enter") searchFossils();
        });
      });

      loadData();
    </script>
  </body>
</html>
